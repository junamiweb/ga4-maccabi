name: Deploy WordPress Plugin to cPanel (FTPS)

on:
  push:
    branches:
      - main
    paths:
      - "ga4-maccabi-tracking/**"
      - ".github/workflows/deploy-plugin-cpanel.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy plugin files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: ${{ secrets.CPANEL_FTP_PORT }}
          local-dir: ./ga4-maccabi-tracking/
          server-dir: ${{ secrets.CPANEL_WP_PLUGIN_PATH }}/ga4-maccabi-tracking/
