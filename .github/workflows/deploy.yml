# מעלה את התוסף לתיקיית plugins דרך FTP
name: Deploy WordPress Plugin to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload plugin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 63.250.61.124
          username: myhelper@shop.maccabi.co.il
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./ga4-maccabi-tracking/
          server-dir: /ga4-maccabi-tracking/